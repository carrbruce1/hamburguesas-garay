<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="title">Hamburguesas Garay</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="shortcut icon" href="img/garay-trans.png" type="image/x-icon">
  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <!-- Iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="bg-[#0c0c0c] text-white">

<!-- HERO -->
<section class="relative min-h-[70vh] flex items-center justify-center text-center overflow-hidden z-10">

  <div class="absolute inset-0 bg-[#0c0c0c] -z-10"></div>
  <div class="absolute w-[400px] h-[400px] bg-orange-500/20 blur-3xl rounded-full -z-10"></div>
  <div class="relative z-10 px-6 max-w-md">

    <!-- LOGO -->
    <div class="relative mb-6">
      <div class="absolute -inset-6 bg-orange-500/20 blur-2xl rounded-full"></div>

      <img src="img/garay-trans.png" 
           class="relative mx-auto w-36 object-contain 
                  drop-shadow-[0_10px_30px_rgba(0,0,0,0.8)]">
    </div>

    <div id="nombre" class="leading-none">

      <p class="text-sm tracking-widest text-gray-400 uppercase">
        Hamburguesas
      </p>

      <h1 class="text-5xl md:text-6xl font-bold text-orange-500">
        Garay
      </h1>

    </div>
    <p class="mt-3 text-gray-400 text-sm md:text-lg">
      Burgers reales. Sin vueltas.
    </p>

    <!-- BOTÓN -->
    <a id="btnHero"
       target="_blank"
       class="mt-6 inline-flex items-center gap-3 
              border border-orange-500 text-orange-500
              px-6 py-3 rounded-full 
              hover:bg-orange-500 hover:text-black
              transition duration-300">

      Pedir ahora
      <i class="fa-solid fa-arrow-right"></i>

    </a>

  </div>

</section>

<!-- MENÚ -->
<section class="relative z-20 px-6 py-16 text-center">

  <!-- TÍTULO -->
  <h2 class="text-3xl md:text-4xl font-bold text-white mb-10 tracking-wide">
    Menú
    <span class="block w-16 h-1 bg-orange-500 mx-auto mt-3 rounded-full"></span>
  </h2>

  <!-- CONTENEDOR -->
  <div id="menu" class="grid sm:grid-cols-2 gap-6 text-left"></div>

</section>

<!-- BOTÓN WHATSAPP -->
<a id="btnWsp"
   target="_blank"
   class="fixed bottom-6 right-6 z-50 w-14 h-14 flex items-center justify-center 
          bg-green-500 text-white rounded-full shadow-lg 
          hover:scale-110 transition">

  <i class="fa-brands fa-whatsapp text-2xl"></i>

</a>

  <!-- WHATSAPP -->
  <a id="btnWsp"
     target="_blank"
     class="fixed bottom-6 right-6 w-14 h-14 flex items-center justify-center 
            bg-green-500 text-white rounded-full shadow-lg 
            hover:scale-110 transition">

    <i class="fa-brands fa-whatsapp text-2xl"></i>

  </a>


  <!-- FOOTER -->
<footer class="bg-[#0a0a0a] border-t border-white/10 mt-10">

  <div class="max-w-6xl mx-auto px-6 py-10 text-center">

    <h3 class="text-lg font-semibold text-orange-500">
      Hamburguesas Garay
    </h3>

    <p class="text-gray-400 text-sm mt-2">
      Burgers reales. Sin vueltas.
    </p>

    <!-- REDES -->
    <div class="flex justify-center gap-6 mt-6 text-xl">

      <a href="https://www.instagram.com/hamburguesas.garay/?hl=es" target="_blank" class="hover:text-orange-400 transition">
        <i class="fa-brands fa-instagram"></i>
      </a>

      <a id="Awsp" class="hover:text-green-400 transition">
        <i class="fa-brands fa-whatsapp"></i>
      </a>

    </div>

    <!-- COPYRIGHT -->
    <p class="text-xs text-gray-500 mt-6">
      © 2026 Hamburguesas Garay
    </p>

  </div>

</footer>

  <!-- SCRIPTS -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
